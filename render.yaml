services:
  - type: web
    name: groceryapp-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false  # Set in Render dashboard (paste entire JSON)
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: OPEN_FOOD_FACTS_API
        value: https://world.openfoodfacts.org/api/v2
      - key: AI_SERVICE_URL
        sync: false
      - key: AI_MODEL_NAME
        value: llama3.2
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: MINDEE_API_KEY
        sync: false  # Set in Render dashboard
      - key: ADMIN_UIDS
        sync: false
      # Firebase web config (for SPA)
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: FIREBASE_WEB_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_WEB_PROJECT_ID
        sync: false
    healthCheckPath: /health
    autoDeploy: true
