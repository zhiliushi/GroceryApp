name: Firestore Rules + Indexes Deploy

# Auto-deploy Firestore security rules and composite indexes when they change
# on main. Requires a service account JSON in the FIREBASE_SERVICE_ACCOUNT secret
# with the "Firebase Rules Admin" + "Cloud Datastore Index Admin" roles (NOT
# full project admin).
#
# To create the secret:
#   1. GCP Console -> IAM -> Service Accounts -> Create
#   2. Roles: Firebase Rules Admin, Cloud Datastore Index Admin
#   3. Create JSON key, copy contents
#   4. GitHub repo -> Settings -> Secrets -> Actions -> New
#      Name: FIREBASE_SERVICE_ACCOUNT
#      Value: <paste full JSON>

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy rules + indexes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account credentials
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA_JSON" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret not set. See workflow file header for setup."
            exit 1
          fi
          echo "$SA_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy Firestore rules
        run: firebase deploy --only firestore:rules --non-interactive

      - name: Deploy Firestore indexes
        run: firebase deploy --only firestore:indexes --non-interactive
