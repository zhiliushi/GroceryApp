name: Web Admin CI

# TypeScript type-check for the React SPA. Runs on PRs + pushes to main
# when anything under backend/web-admin/** changes.

on:
  push:
    branches: [main]
    paths:
      - 'backend/web-admin/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/web-admin/**'

jobs:
  typecheck:
    name: Type-check (tsc -b)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/web-admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/web-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b
